<title>Karigar - Batch Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf9f7;
  --card:#ffffff;
  --border:#edeae4;
  --border2:#d8d3ca;
  --text:#1c1a17;
  --muted:#7a736a;
  --faint:#b8b0a5;
  --brand:#8b4b1f;
  --brand-light:#fdf2eb;
  --brand-mid:#a85d2a;
  --green:#15803d;
  --green-bg:#f0fdf4;
  --amber:#92400e;
  --amber-bg:#fffbeb;
  --sans:'Calibri','Gill Sans','Optima',sans-serif;
  --mono:'Consolas','Cascadia Code','Courier New',monospace;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}

/* ── Topbar ── */
.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:20;
  box-shadow:var(--shadow);
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{height:42px;width:auto;display:block;}
.topbar-title{font-size:16px;font-weight:700;color:var(--brand);letter-spacing:-0.2px;}
.topbar-subtitle{font-size:11px;color:var(--muted);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.sync-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:12px;font-family:var(--mono);
  background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0;
}
.sync-pill.syncing{background:var(--amber-bg);color:var(--amber);border-color:#fde68a;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}
.dot.pulse{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  border:1px solid var(--border2);font-family:var(--sans);
  transition:all .13s;background:var(--card);color:var(--text);
  white-space:nowrap;
}
.btn:hover{background:var(--bg);border-color:var(--brand);color:var(--brand);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-brand{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-brand:hover{background:var(--brand-mid);color:#fff;border-color:var(--brand-mid);}
.btn svg{width:15px;height:15px;flex-shrink:0;}
.btn-icon{padding:8px;border-radius:8px;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted);padding:8px 10px;}
.btn-ghost:hover{background:var(--bg);border-color:var(--border2);color:var(--brand);}

/* ── Page ── */
.page{max-width:960px;margin:0 auto;padding:24px 16px 80px;}

/* ── Settings panel ── */
.settings-panel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:20px;box-shadow:var(--shadow);
  display:none;
}
.settings-panel.open{display:block;}
.settings-grid{display:grid;grid-template-columns:1fr 2fr 1.5fr;gap:10px;align-items:end;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);}
.field input,.field select{
  padding:8px 12px;border:1px solid var(--border2);border-radius:8px;
  font-family:var(--mono);font-size:13px;background:var(--bg);color:var(--text);
  outline:none;transition:border .12s;
}
.field input:focus,.field select:focus{border-color:var(--brand);}
.settings-footer{display:flex;justify-content:flex-end;margin-top:12px;}

/* ── Filter bar ── */
.filter-bar{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:20px;box-shadow:var(--shadow);
  display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;
}
.filter-bar-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--brand);padding-bottom:2px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.filter-bar-label svg{width:14px;height:14px;}
.filter-fields{display:flex;gap:12px;flex:1;flex-wrap:wrap;}
.filter-fields .field{flex:1;min-width:140px;}
.filter-fields .field select{font-family:var(--sans);font-size:13px;}
.filter-reset{
  display:none;align-items:center;
  padding-bottom:1px;
}
.filter-reset.visible{display:flex;}
.active-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--brand);display:inline-block;
  animation:pulse 1.5s infinite;
}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--brand);border-radius:var(--radius) var(--radius) 0 0;
}
.stat-label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.stat-num{font-size:36px;font-weight:700;font-family:var(--sans);line-height:1;color:var(--brand);letter-spacing:-1px;}
.stat-sub{font-size:12px;color:var(--faint);margin-top:4px;}

/* ── Section head ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.section-head h2{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.dl-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ── Table card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
thead th{
  text-align:left;padding:12px 16px;font-size:11px;font-weight:700;
  color:var(--faint);text-transform:uppercase;letter-spacing:.07em;font-family:var(--sans);
  background:var(--bg);border-bottom:1px solid var(--border);
}
.batch-row td{padding:15px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* ── Cells ── */
.batch-badge{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--brand);}
.course-name{font-size:14px;color:var(--text);}
.count-big{font-family:var(--sans);font-size:20px;font-weight:700;color:var(--text);}
.date-cell{font-family:var(--mono);font-size:12px;color:var(--muted);}

/* ── Loading / empty ── */
.center-msg{text-align:center;padding:64px 20px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Banner ── */
.banner{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:18px;border:1px solid;line-height:1.6;}
.banner-err{background:#fff5f5;color:#c0392b;border-color:#fecaca;}
.banner-ok{background:var(--green-bg);color:var(--green);border-color:#bbf7d0;}

/* ── Mobile cards ── */
.mobile-batch-list{display:none;flex-direction:column;gap:10px;}
.mobile-batch-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.mobile-batch-header{
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  border-left:4px solid var(--brand);
}
.mobile-batch-meta{flex:1;}
.mobile-batch-num{font-size:16px;font-weight:700;color:var(--brand);}
.mobile-batch-course{font-size:13px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.mobile-batch-right{text-align:right;flex-shrink:0;margin-left:12px;}
.mobile-batch-count{font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.mobile-batch-label{font-size:11px;color:var(--faint);margin-top:2px;}
.mobile-batch-footer{
  padding:10px 16px;background:var(--bg);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.mobile-batch-date{font-size:12px;font-family:var(--mono);color:var(--muted);}
.mobile-batch-lab{font-size:12px;color:var(--muted);}

/* ── Responsive ── */
@media(max-width:700px){
  .topbar-subtitle{display:none;}
  .topbar-title{font-size:14px;}
  .sync-pill span:not(.dot){display:none;}
  .sync-pill{padding:5px 8px;}
  .stats{grid-template-columns:1fr 1fr;gap:10px;}
  .stats .stat:last-child{grid-column:1/-1;}
  .stat-num{font-size:30px;}
  .dl-row .btn{font-size:13px;padding:7px 12px;}
  .card table{display:none;}
  .mobile-batch-list{display:flex;}
  .settings-grid{grid-template-columns:1fr;}
  .filter-bar{flex-direction:column;align-items:stretch;gap:10px;}
  .filter-bar-label{margin-bottom:2px;}
  .filter-fields{flex-direction:column;gap:8px;}
}
@media(max-width:400px){
  .stats{grid-template-columns:1fr;}
  .stats .stat:last-child{grid-column:auto;}
  .topbar-logo{height:36px;}
}
</style>
</head>
<body>

<script>
const PROXY='https://corsproxy.io/?';
let lastBatches=[],lastSubs=[];

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('open');
}

function getField(row,...keys){
  for(const k of keys){
    for(const rk of Object.keys(row)){
      if(rk===k||rk.endsWith('/'+k)){
        const v=row[rk];
        if(v!==null&&v!==undefined&&v!=='')return String(v);
      }
    }
  }
  return '';
}

function fmtDate(d){
  if(!d)return'—';
  try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});}
  catch{return d.slice(0,10);}
}

function getMonthKey(dateStr){
  if(!dateStr)return'';
  try{
    const d=new Date(dateStr);
    return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }catch{return'';}
}

function getMonthLabel(key){
  if(!key)return'';
  const [y,m]=key.split('-');
  const d=new Date(parseInt(y),parseInt(m)-1,1);
  return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}

async function fetchAllPages(server,uid,token){
  let results=[],url=`${server}/api/v2/assets/${uid}/data/?format=json&limit=100`;
  while(url){
    const res=await fetch(PROXY+encodeURIComponent(url),{headers:{'Authorization':`Token ${token}`,'x-requested-with':'XMLHttpRequest'}});
    if(!res.ok)throw new Error(`API error ${res.status} — check your token and asset UID`);
    const data=await res.json();
    results=results.concat(data.results||[]);
    url=data.next||null;
  }
  return results;
}

function groupByBatch(subs){
  const map={};
  for(const s of subs){
    const bn=getField(s,'batch_number')||'Unknown';
    const ns=parseInt(getField(s,'num_students'))||0;
    const course=getField(s,'selected_course');
    const lab=getField(s,'lab_center');
    const date=s._submission_time||s.end||'';
    if(!map[bn])map[bn]={batch:bn,course,lab,total:0,submissions:[],lastDate:''};
    map[bn].total+=ns;
    map[bn].submissions.push({date,count:ns,id:s._id||''});
    if(date>map[bn].lastDate)map[bn].lastDate=date;
    if(!map[bn].course&&course)map[bn].course=course;
    if(!map[bn].lab&&lab)map[bn].lab=lab;
  }
  return Object.values(map).sort((a,b)=>{
    const na=parseInt(a.batch),nb=parseInt(b.batch);
    return(!isNaN(na)&&!isNaN(nb))?na-nb:a.batch.localeCompare(b.batch);
  });
}

function populateFilters(batches){
  const courses=[...new Set(batches.map(b=>b.course).filter(Boolean))].sort();
  const labs=[...new Set(batches.map(b=>b.lab).filter(Boolean))].sort();
  const monthKeys=[...new Set(batches.map(b=>getMonthKey(b.lastDate)).filter(Boolean))].sort().reverse();

  const cs=document.getElementById('filter-course');
  const ls=document.getElementById('filter-lab');
  const ms=document.getElementById('filter-month');

  const prev={c:cs.value,l:ls.value,m:ms.value};

  cs.innerHTML='<option value="">All Courses</option>'+courses.map(c=>`<option value="${c}">${c}</option>`).join('');
  ls.innerHTML='<option value="">All Labs</option>'+labs.map(l=>`<option value="${l}">${l}</option>`).join('');
  ms.innerHTML='<option value="">All Months</option>'+monthKeys.map(k=>`<option value="${k}">${getMonthLabel(k)}</option>`).join('');

  // restore previous selection if still valid
  if(prev.c&&courses.includes(prev.c))cs.value=prev.c;
  if(prev.l&&labs.includes(prev.l))ls.value=prev.l;
  if(prev.m&&monthKeys.includes(prev.m))ms.value=prev.m;
}

function getFilteredBatches(){
  const course=document.getElementById('filter-course').value;
  const lab=document.getElementById('filter-lab').value;
  const month=document.getElementById('filter-month').value;
  return lastBatches.filter(b=>{
    if(course&&b.course!==course)return false;
    if(lab&&b.lab!==lab)return false;
    if(month&&getMonthKey(b.lastDate)!==month)return false;
    return true;
  });
}

function filtersActive(){
  return !!(document.getElementById('filter-course').value||
            document.getElementById('filter-lab').value||
            document.getElementById('filter-month').value);
}

function resetFilters(){
  document.getElementById('filter-course').value='';
  document.getElementById('filter-lab').value='';
  document.getElementById('filter-month').value='';
  applyFilters();
}

function applyFilters(){
  const filtered=getFilteredBatches();
  const active=filtersActive();
  document.getElementById('filter-reset').classList.toggle('visible',active);
  const total=lastBatches.length;
  document.getElementById('section-title').textContent=
    active?`Batches (${filtered.length} of ${total})`:'All Batches';
  renderStats(filtered);
  renderTable(filtered);
  renderMobile(filtered);
}

function renderStats(batches){
  const students=batches.reduce((s,b)=>s+b.total,0);
  const courses=new Set(batches.map(b=>b.course).filter(Boolean)).size;
  document.getElementById('stats').innerHTML=`
    <div class="stat">
      <div class="stat-label">Batches</div>
      <div class="stat-num">${batches.length}</div>
      <div class="stat-sub">batches tracked</div>
    </div>
    <div class="stat">
      <div class="stat-label">Students Registered</div>
      <div class="stat-num">${students}</div>
      <div class="stat-sub">across all batches</div>
    </div>
    <div class="stat">
      <div class="stat-label">Courses</div>
      <div class="stat-num">${courses}</div>
      <div class="stat-sub">unique courses</div>
    </div>
  `;
}

function renderTable(batches){
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  if(!batches.length){
    tbody.innerHTML=`<tr><td colspan="5"><div class="center-msg">No batches match the selected filters.</div></td></tr>`;
    return;
  }
  for(const b of batches){
    const tr=document.createElement('tr');
    tr.className='batch-row';
    tr.innerHTML=`
      <td><span class="batch-badge">Batch ${b.batch}</span></td>
      <td><div class="course-name">${b.course||'—'}</div></td>
      <td style="color:var(--muted);font-size:13px">${b.lab||'—'}</td>
      <td><span class="count-big">${b.total}</span></td>
      <td class="date-cell">${fmtDate(b.lastDate)}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderMobile(batches){
  const list=document.getElementById('mobile-list');
  list.innerHTML='';
  for(const b of batches){
    const card=document.createElement('div');
    card.className='mobile-batch-card';
    card.innerHTML=`
      <div class="mobile-batch-header">
        <div class="mobile-batch-meta">
          <div class="mobile-batch-num">Batch ${b.batch}</div>
          <div class="mobile-batch-course">${b.course||'No course'}</div>
        </div>
        <div class="mobile-batch-right">
          <div class="mobile-batch-count">${b.total}</div>
          <div class="mobile-batch-label">students</div>
        </div>
      </div>
      <div class="mobile-batch-footer">
        <span class="mobile-batch-date">Last: ${fmtDate(b.lastDate)}</span>
        <span class="mobile-batch-lab">${b.lab||'—'}</span>
      </div>
    `;
    list.appendChild(card);
  }
}

function downloadCSV(type){
  const filtered=getFilteredBatches();
  if(!filtered.length)return;
  let rows,filename;
  if(type==='summary'){
    rows=[['Batch Number','Course','Lab / Center','Total Students','Last Entry Date']];
    for(const b of filtered)rows.push([b.batch,b.course||'',b.lab||'',b.total,fmtDate(b.lastDate)]);
    filename='batch_summary.csv';
  }else{
    rows=[['Batch Number','Course','Lab / Center','Enrollment Date','Full Name','Age','Gender','Current Status','School / College','Village / City','Mobile','Email','Student ID','Enrollment ID']];
    const filteredBatchNums=new Set(filtered.map(b=>b.batch));
    for(const s of lastSubs){
      const batch=getField(s,'batch_number');
      if(!filteredBatchNums.has(batch))continue;
      const course=getField(s,'selected_course'),lab=getField(s,'lab_center');
      const date=getField(s,'enroll_date'),eid=getField(s,'enrollment_id');
      const students=s['students']||s['grp_batch/students']||[];
      for(const st of students){
        const gf=k=>{for(const rk of Object.keys(st))if(rk===k||rk.endsWith('/'+k))return String(st[rk]||'');return'';};
        rows.push([batch,course,lab,date,gf('full_name'),gf('age'),gf('gender'),gf('current_grade'),
          gf('school_name')||gf('college_name'),gf('address'),gf('mobile_number'),gf('email_id'),gf('student_id'),eid]);
      }
    }
    filename='students.csv';
  }
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=filename;a.click();
}

async function fetchData(){
  const server=document.getElementById('server').value;
  const token=document.getElementById('token').value.trim();
  const uid=document.getElementById('uid').value.trim();
  document.getElementById('banner-area').innerHTML='';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loading-area').innerHTML=`<div class="center-msg"><div class="spinner"></div>Loading submissions…</div>`;
  document.getElementById('refresh-btn').disabled=true;
  const pill=document.getElementById('sync-pill');
  pill.style.display='inline-flex';
  pill.className='sync-pill syncing';
  document.getElementById('sync-text').textContent='syncing';
  document.querySelector('#sync-pill .dot').classList.add('pulse');

  try{
    const subs=await fetchAllPages(server,uid,token);
    lastSubs=subs;
    lastBatches=groupByBatch(subs);
    populateFilters(lastBatches);
    const filtered=getFilteredBatches();
    renderStats(filtered);
    renderTable(filtered);
    renderMobile(filtered);
    document.getElementById('dashboard').style.display='block';
    const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    pill.className='sync-pill';
    document.getElementById('sync-text').textContent=t;
    document.querySelector('#sync-pill .dot').classList.remove('pulse');
    if(!subs.length)document.getElementById('banner-area').innerHTML=`<div class="banner banner-ok">Connected — no submissions yet.</div>`;
  }catch(e){
    document.getElementById('banner-area').innerHTML=`<div class="banner banner-err"><strong>Error:</strong> ${e.message}</div>`;
    pill.style.display='none';
  }finally{
    document.getElementById('loading-area').innerHTML='';
    document.getElementById('refresh-btn').disabled=false;
  }
}

window.onload=fetchData;
</script>
